name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Clear NuGet Caches
      run: dotnet nuget locals all --clear

    - name: Restore Desktop Project
      run: dotnet restore src/Desktop/Desktop.csproj --no-cache

    - name: Build Desktop Project
      run: dotnet build src/Desktop/Desktop.csproj -c Release --no-restore

    - name: Upload Desktop Artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: desktop-build-${{ matrix.os }}
        path: src/Desktop/bin/Release/net10.0/**
        retention-days: 7

  test:
    name: Run xUnit Tests
    runs-on: ubuntu-latest
    needs: [build-desktop]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore Test Project
      run: dotnet restore src/de.openelp.regatta.Tests/de.openelp.regatta.Tests.csproj --no-cache

    - name: Run xUnit Tests
      run: dotnet test src/de.openelp.regatta.Tests/de.openelp.regatta.Tests.csproj -c Release --no-restore --logger trx

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: '**/TestResults/**'
        retention-days: 7
