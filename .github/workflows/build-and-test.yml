name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Run xUnit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore Test Project
      run: dotnet restore src/de.openelp.regatta.Tests/de.openelp.regatta.Tests.csproj --no-cache

    - name: Run xUnit Tests
      run: dotnet test src/de.openelp.regatta.Tests/de.openelp.regatta.Tests.csproj -c Release --no-restore --logger trx

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: '**/TestResults/**'
        retention-days: 7

  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [test]
    if: github.event_name == 'release' && github.event.action == 'created'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Clear NuGet Caches
      run: dotnet nuget locals all --clear

    - name: Restore Desktop Project
      run: dotnet restore src/Desktop/Desktop.csproj --no-cache

    - name: Build Desktop Project
      run: dotnet build src/Desktop/Desktop.csproj -c Release --no-restore

    - name: Upload Desktop Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: desktop-build-${{ matrix.os }}
        path: src/Desktop/bin/Release/net10.0/**
        retention-days: 7

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'release' && github.event.action == 'created'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Install Android Workload
      run: dotnet workload install android

    - name: Restore Android Project
      run: dotnet restore src/Android/Android.csproj --no-cache

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > ${{ github.workspace }}/release.keystore

    - name: Build and Sign Android Project
      run: >
        dotnet publish src/Android/Android.csproj `
          -c Release `
          -f net10.0-android `
          -p:AndroidPackageFormat=aab `
          -p:AndroidKeyStore=true `
          -p:AndroidSigningKeyStore=${{ github.workspace }}/release.keystore `
          -p:AndroidSigningKeyAlias=${{ secrets.KEY_ALIAS }} `
          -p:AndroidSigningKeyPass=${{ secrets.KEY_PASSWORD }} `
          -p:AndroidSigningStorePass=${{ secrets.KEYSTORE_PASSWORD }} `
          -o ./publish/android

    - name: Upload Android Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-app
        path: ./publish/android/*.aab
        if-no-files-found: warn
        retention-days: 7

  publish-desktop-release-assets:
    name: Publish Desktop Release Assets
    runs-on: ubuntu-latest
    needs: [build-desktop]
    if: github.event_name == 'release' && github.event.action == 'created'

    steps:
    - name: Download Desktop Artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: desktop-build-*
        path: release-assets

    - name: Package Desktop Artifacts
      run: |
        for dir in release-assets/*; do
          [ -d "$dir" ] || continue
          name="$(basename "$dir")"
          (cd "$dir" && zip -r "../${name}.zip" .)
        done

    - name: Upload Desktop Assets to Release
      uses: softprops/action-gh-release@v2
      with:
        files: release-assets/*.zip

  publish-android-release-assets:
    name: Publish Android to Play Store
    runs-on: ubuntu-latest
    needs: [build-android]
    if: github.event_name == 'release' && github.event.action == 'created'

    steps:
    - name: Download Android Artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: android-build
        path: release-assets
        
    - name: Upload Android Assets to Release
      uses: softprops/action-gh-release@v2
      with:
        files: release-assets/**/*.aab

    - name: Publish to Google Play Store
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
        packageName: de.openelp.regatta
        releaseFiles: release-assets/**/*.aab
        track: internal

