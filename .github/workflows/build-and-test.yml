name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Run xUnit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # v4 ist aktuell die stabilste Version
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          10.0.x
          8.0.x

    - name: Install Android Workload
      # Wichtig, falls die Tests Referenzen auf das Android-Projekt haben
      run: dotnet workload install android

    - name: Restore Test Project
      # Wir restoren die gesamte Solution oder das spezifische Projekt
      run: dotnet restore src/de.openelp.regatta.Tests/de.openelp.regatta.Tests.csproj

    - name: Run xUnit Tests (TRX + OpenCover)
      run: |
        dotnet test src/de.openelp.regatta.Tests/de.openelp.regatta.Tests.csproj \
          -c Release \
          --logger "trx;LogFileName=test_results.trx" \
          --results-directory ./TestResults \
          /p:CollectCoverage=true \
          /p:CoverletOutput=./TestResults/coverage/ \
          /p:CoverletOutputFormat=opencover

    - name: Publish test results (GitHub Check)
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: dotnet tests
        path: TestResults/**/*.trx
        reporter: dotnet-trx
        fail-on-error: true

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: ./TestResults/**
        retention-days: 7

    # SonarCloud Scan (TRX + Coverage Pfade als args)
    - name: SonarCloud Scan
      if: always()
      uses: SonarSource/sonarcloud-github-action@v3
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          
  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [test]
    # if: github.event_name == 'release' && github.event.action == 'created'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Extract Version
      id: get_version
      shell: bash
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF_NAME#v}
        else
          VERSION="0.0.9-dev"
        fi
        
        echo "VERSION_NAME=$VERSION" >> $GITHUB_OUTPUT
        echo "VERSION_FULL=$VERSION.${{ github.run_number }}" >> $GITHUB_OUTPUT

    - name: Publish Desktop (Self-Contained)
      # Wir publishen "Self-Contained", damit der User kein .NET installieren muss
      shell: bash
      run: |
        dotnet publish src/Desktop/Desktop.csproj -c Release \
          -r ${{ matrix.os == 'windows-latest' && 'win-x64' || 'linux-x64' }} \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:Version=${{ steps.get_version.outputs.VERSION_FULL }} \
          -o ./publish/app

    - name: Create Windows MSIX
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        $VersionName = "${{ steps.get_version.outputs.VERSION_NAME }}"
        if ($VersionName -match '^(\d+)\.(\d+)\.(\d+)') {
          $MsixVersion = "$($Matches[1]).$($Matches[2]).$($Matches[3]).${{ github.run_number }}"
        }
        else {
          $MsixVersion = "1.0.0.${{ github.run_number }}"
        }

        $AppDir = "publish\app"
        $MsixRoot = "publish\msix"
        $InstallersDir = "publish\installers"
        $MsixFile = Join-Path $InstallersDir "Luebeck-Regatta-${{ steps.get_version.outputs.VERSION_FULL }}-win-x64.msix"

        New-Item -ItemType Directory -Force -Path $MsixRoot | Out-Null
        New-Item -ItemType Directory -Force -Path $InstallersDir | Out-Null
        Copy-Item -Path "$AppDir\*" -Destination $MsixRoot -Recurse -Force
        Copy-Item -Path "src\Desktop\Assets\lrv-logo.png" -Destination (Join-Path $MsixRoot "lrv-logo.png") -Force

        [xml]$Manifest = Get-Content "src\Desktop\AppxManifest.xml"
        $Manifest.Package.Identity.Version = $MsixVersion
        $Manifest.Save((Join-Path $MsixRoot "AppxManifest.xml"))

        $MakeAppx = (Get-Command makeappx.exe -ErrorAction SilentlyContinue).Source
        if (-not $MakeAppx) {
          $MakeAppx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\makeappx.exe" |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
        }

        if (-not $MakeAppx) {
          throw "makeappx.exe not found on runner"
        }

        & $MakeAppx pack /d $MsixRoot /p $MsixFile /o

    - name: Create AppImage (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        set -euo pipefail

        APP_NAME="Lübeck Regatta"
        BIN_NAME="App.LuebeckRegatta"
        APP_ID="de.openelp.regatta"
        VERSION="${{ steps.get_version.outputs.VERSION_FULL }}"

        # 1) Publish (Linux)
        dotnet publish src/Desktop/Desktop.csproj \
          -c Release \
          -r linux-x64 \
          -f net10.0 \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:Version="$VERSION" \
          -o ./publish/linux
        ls -la ./publish/linux

        # 2) Build AppDir layout
        APPDIR="./publish/AppDir"
        rm -rf "$APPDIR"
        mkdir -p "$APPDIR/usr/bin"
        mkdir -p "$APPDIR/usr/share/applications"
        mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"
        tree "$APPDIR"

        cp -a ./publish/linux/* "$APPDIR/usr/bin/"
        tree "$APPDIR"

        # AppRun
        cat > "$APPDIR/AppRun" <<EOF
        #!/bin/sh
        HERE="\$(dirname "\$(readlink -f "\$0")")"
        exec "\$HERE/usr/bin/$BIN_NAME" "\$@"
        EOF
        chmod +x "$APPDIR/AppRun"

        # Desktop file
        cat > "$APPDIR/usr/share/applications/$APP_ID.desktop" <<EOF
        [Desktop Entry]
        Type=Application
        Name=$APP_NAME
        Exec=$BIN_NAME
        Icon=$APP_ID
        Categories=Utility;Sports;
        Terminal=false
        EOF
        # appimagetool will a .desktop in the AppDir root
        cp "$APPDIR/usr/share/applications/$APP_ID.desktop" "$APPDIR/$APP_ID.desktop"

        # Icon (du hast es bereits im Desktop.csproj-Assets, wir nehmen die Datei direkt)
        cp src/Desktop/Assets/lrv-logo.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/$APP_ID.png"
        cp src/Desktop/Assets/lrv-logo.png "$APPDIR/$APP_ID.png"

        # 3) appimagetool holen und ohne FUSE nutzbar machen
        curl -L -o appimagetool.AppImage \
          "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
        chmod +x appimagetool.AppImage

        # Extract (kein FUSE nötig)
        ./appimagetool.AppImage --appimage-extract
        chmod +x squashfs-root/AppRun

        # Build AppImage
        mkdir -p ./publish/installers
        ./squashfs-root/AppRun "$APPDIR" "./publish/installers/Luebeck-Regatta-${VERSION}-x86_64.AppImage"

        ls -lh ./publish/installers/*.AppImage

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: installers-${{ matrix.os }}
        path: ./publish/installers/*
        retention-days: 7

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'release' && github.event.action == 'created'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Install Android Workload
      run: dotnet workload install android

    - name: Restore Android Project
      run: dotnet restore src/Android/Android.csproj --no-cache

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > ${{ github.workspace }}/release.keystore

    - name: Extract Version from Tag
      id: get_version
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        echo "GITHUB_REF_NAME=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        echo "VERSION_NAME=$VERSION" >> $GITHUB_OUTPUT
        echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_OUTPUT

    - name: Build Android (AAB and APK)
      run: |
        # 1. Erzeuge das AAB für den Play Store
        dotnet publish src/Android/Android.csproj \
          -c Release -f net10.0-android \
          -p:AndroidPackageFormat=aab \
          -p:AndroidKeyStore=true \
          -p:AndroidSigningKeyStore=${{ github.workspace }}/release.keystore \
          -p:AndroidSigningKeyAlias=${{ secrets.KEY_ALIAS }} \
          -p:AndroidSigningKeyPass=${{ secrets.KEY_PASSWORD }} \
          -p:AndroidSigningStorePass=${{ secrets.KEYSTORE_PASSWORD }} \
          -p:ApplicationVersion=${{ steps.get_version.outputs.VERSION_CODE }} \
          -p:ApplicationDisplayVersion="${{ steps.get_version.outputs.VERSION_NAME }}" \
          -o ./publish/android

        # 2. Erzeuge die APK für manuelles Testen
        dotnet publish src/Android/Android.csproj \
          -c Release -f net10.0-android \
          -p:AndroidPackageFormat=apk \
          -p:AndroidKeyStore=true \
          -p:AndroidSigningKeyStore=${{ github.workspace }}/release.keystore \
          -p:AndroidSigningKeyAlias=${{ secrets.KEY_ALIAS }} \
          -p:AndroidSigningKeyPass=${{ secrets.KEY_PASSWORD }} \
          -p:AndroidSigningStorePass=${{ secrets.KEYSTORE_PASSWORD }} \
          -p:ApplicationVersion=${{ steps.get_version.outputs.VERSION_CODE }} \
          -p:ApplicationDisplayVersion="${{ steps.get_version.outputs.VERSION_NAME }}" \
          -o ./publish/android/apk

    - name: Upload Android Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-app
        path: ./publish/android/*.aab
        if-no-files-found: warn
        retention-days: 7

  publish-desktop-release-assets:
    name: Publish Desktop Release Assets
    runs-on: ubuntu-latest
    needs: [build-desktop]
    if: github.event_name == 'release' && github.event.action == 'created'

    steps:
    - name: Download Desktop Artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: installers-*
        path: release-assets
        merge-multiple: true

    - name: Generate WinGet Manifests
      run: |
        set -euo pipefail

        MSIX_PATH="$(find release-assets -type f -name '*.msix' | head -n 1)"
        if [ -z "$MSIX_PATH" ]; then
          echo "No MSIX artifact found; skipping WinGet manifest generation"
          exit 0
        fi

        MSIX_FILE="$(basename "$MSIX_PATH")"
        VERSION="$(echo "$MSIX_FILE" | sed -E 's/^Luebeck-Regatta-(.*)-win-x64\.msix$/\1/')"
        SHA256="$(sha256sum "$MSIX_PATH" | awk '{print toupper($1)}')"
        INSTALLER_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${MSIX_FILE}"

        mkdir -p release-assets/winget

        cat > "release-assets/winget/Sanifant.LuebeckRegatta.yaml" <<EOF
        PackageIdentifier: Sanifant.LuebeckRegatta
        PackageVersion: $VERSION
        DefaultLocale: de-DE
        ManifestType: version
        ManifestVersion: 1.6.0
        EOF

        cat > "release-assets/winget/Sanifant.LuebeckRegatta.installer.yaml" <<EOF
        PackageIdentifier: Sanifant.LuebeckRegatta
        PackageVersion: $VERSION
        InstallerType: msix
        Installers:
          - Architecture: x64
            InstallerUrl: $INSTALLER_URL
            InstallerSha256: $SHA256
            SignatureSha256: $SHA256
        ManifestType: installer
        ManifestVersion: 1.6.0
        EOF

        cat > "release-assets/winget/Sanifant.LuebeckRegatta.locale.de-DE.yaml" <<EOF
        PackageIdentifier: Sanifant.LuebeckRegatta
        PackageVersion: $VERSION
        PackageLocale: de-DE
        Publisher: OpenELP
        PackageName: Lübeck Regatta
        ShortDescription: Desktop-App für die Lübeck Regatta
        License: Proprietary
        ManifestType: defaultLocale
        ManifestVersion: 1.6.0
        EOF

    - name: Package Desktop Artifacts
      run: |
        for dir in release-assets/*; do
          [ -d "$dir" ] || continue
          name="$(basename "$dir")"
          (cd "$dir" && zip -r "../${name}.zip" .)
        done

    - name: Upload Desktop Assets to Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release-assets/**/*.msix
          release-assets/**/*.AppImage
          release-assets/**/*.deb
          release-assets/**/*.zip
          release-assets/winget/*.yaml

  publish-android-release-assets:
    name: Publish Android to Play Store
    runs-on: ubuntu-latest
    needs: [build-android]
    if: github.event_name == 'release' && github.event.action == 'created'

    steps:
    - name: Download Android Artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: android-app
        path: release-assets
        
    - name: Upload Android Assets to Release
      uses: softprops/action-gh-release@v2
      with:
        files: release-assets/**/*.apk

    - name: Publish to Google Play Store
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
        packageName: de.openelp.regatta
        releaseFiles: release-assets/**/*-Signed.aab
        track: internal
        status: draft

