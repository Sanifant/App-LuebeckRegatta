  test:
    name: Run Tests
    runs-on: windows-latest
    needs: [build-android, build-windows]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Install .NET MAUI Workload
      run: |
        dotnet workload install android
        dotnet workload install maui-android

    - name: Restore Dependencies
      run: |
          dotnet clean
          dotnet nuget locals all --clear
          dotnet restore --no-cache

    - name: Run Unit Tests
      run: dotnet test LuebeckRegatta.App.Tests/LuebeckRegatta.App.Tests.csproj --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --logger trx
      continue-on-error: true
      
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: '**/TestResults/**'
        retention-days: 7
        
    - name: Publish Test Results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results
        path: '**/*.trx'
        reporter: dotnet-trx

  publish-google-play:
    name: Publish to Google Play Store
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
      
    - name: Download Android Artifacts
      uses: actions/download-artifact@v4
      with:
        name: android-build
        path: ./artifacts
        
    - name: Find AAB File
      id: find-aab
      run: |
        AAB_FILE=$(find ./artifacts -name "*.aab" -type f | head -n 1)
        echo "aab_path=$AAB_FILE" >> $GITHUB_OUTPUT
        echo "Found AAB: $AAB_FILE"
        
    - name: Upload to Google Play Store
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        packageName: com.sanifant.luebeckregatta
        releaseFiles: ${{ steps.find-aab.outputs.aab_path }}
        track: internal
        status: completed
        inAppUpdatePriority: 2